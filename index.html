<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：添加viewport适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹贪吃蛇 - Neon Snake</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segue UI','Microsoft YaHei',sans-serif;overflow:hidden}
        .game-container{position:relative;display:flex;flex-direction:column;align-items:center;gap:20px;padding:10px;width:100%;max-width:100vw}
        .title{color:#00ff88;font-size:2.5em;font-weight:bold;text-shadow:0 0 20px #00ff88,0 0 40px #00ff88,0 0 60px #00ff88;letter-spacing:8px;animation:titlePulse 2s ease-in-out infinite}
        @keyframes titlePulse{0%,100%{opacity:1;text-shadow:0 0 20px #00ff88,0 0 40px #00ff88}50%{opacity:.8;text-shadow:0 0 10px #00ff88,0 0 20px #00ff88}}
        .score-board{display:flex;gap:40px;color:#fff;font-size:1.2em}
        .score-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);padding:8px 20px;border-radius:20px;border:1px solid rgba(0,255,136,.3)}
        .score-item span{color:#00ff88;font-weight:bold;font-size:1.3em}
        .canvas-wrapper{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 30px rgba(0,255,136,.2),inset 0 0 30px rgba(0,255,136,.05);border:2px solid rgba(0,255,136,.3);
        /* 新增：让画布容器自适应，最大宽度不超过屏幕 */
        max-width: 100%;
        width: fit-content;
        }
        canvas{display:block;background:#0d1117;
        /* 新增：canvas最大宽度不超过容器，保持宽高比 */
        max-width: 100%;
        height: auto;
        image-rendering: pixelated;
        }
        .controls{display:flex;gap:15px;margin-top:10px}
        .btn{padding:12px 30px;border:none;border-radius:25px;font-size:1em;font-weight:bold;cursor:pointer;transition:all .3s ease;text-transform:uppercase;letter-spacing:2px}
        .btn-start{background:linear-gradient(135deg,#00ff88,#00cc6a);color:#000;box-shadow:0 0 20px rgba(0,255,136,.4)}
        .btn-start:hover{transform:translateY(-2px);box-shadow:0 5px 25px rgba(0,255,136,.6)}
        .btn-pause{background:linear-gradient(135deg,#ffaa00,#ff8800);color:#000;box-shadow:0 0 20px rgba(255,170,0,.4)}
        .btn-pause:hover{transform:translateY(-2px);box-shadow:0 5px 25px rgba(255,170,0,.6)}
        .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;border-radius:16px}
        .overlay h2{color:#ff4444;font-size:3em;margin-bottom:20px;text-shadow:0 0 20px #ff4444;animation:gameOverPulse 1s ease-in-out infinite}
        @keyframes gameOverPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .overlay p{color:#fff;font-size:1.3em;margin-bottom:30px}
        .overlay .final-score{color:#00ff88;font-size:2em;font-weight:bold}
        .hidden{display:none!important}
        .speed-control{display:flex;align-items:center;gap:15px;color:#fff;margin-top:10px}
        .speed-control label{font-size:.9em;color:#888}
        .speed-slider{width:150px;-webkit-appearance:none;appearance:none;height:6px;background:#333;border-radius:3px;outline:none}
        .speed-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;background:#00ff88;border-radius:50%;cursor:pointer;box-shadow:0 0 10px #00ff88}
        .speed-value{color:#00ff88;font-weight:bold;min-width:60px}
        .instructions{color:#666;font-size:.85em;margin-top:5px}

        /* 适配手机屏幕的额外样式 */
        @media (max-width: 768px) {
            .title { font-size: 1.8em; letter-spacing: 4px; }
            .score-board { gap: 15px; font-size: 1em; }
            .score-item { padding: 6px 12px; }
            .btn { padding: 10px 20px; font-size: 0.9em; }
            .overlay h2 { font-size: 2em; }
            .overlay p { font-size: 1.1em; }
            .instructions { font-size: 0.75em; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">NEON SNAKE</div>
        <div class="score-board">
            <div class="score-item"><div>得分</div><span id="score">0</span></div>
            <div class="score-item"><div>最高分</div><span id="highScore">0</span></div>
            <div class="score-item"><div>长度</div><span id="length">3</span></div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div id="gameOverOverlay" class="overlay hidden"><h2>GAME OVER</h2><p>最终得分: <span class="final-score" id="finalScore">0</span></p><button class="btn btn-start" onclick="restartGame()">重新开始</button></div>
            <div id="startOverlay" class="overlay"><h2 style="color:#00ff88;animation:titlePulse 2s ease-in-out infinite">READY?</h2><p style="margin-bottom:30px;">使用方向键或WASD控制蛇的移动</p><button class="btn btn-start" onclick="startGame()">开始游戏</button></div>
        </div>
        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startGame()">开始</button>
            <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">暂停</button>
        </div>
        <div class="speed-control">
            <label>游戏速度:</label>
            <input type="range" class="speed-slider" id="speedSlider" min="50" max="200" value="120" onchange="updateSpeed()">
            <span class="speed-value" id="speedValue">正常</span>
        </div>
        <div class="instructions">按空格键暂停/继续 | 方向键或WASD控制移动</div>
    </div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const GRID_SIZE=20;
const TILE_COUNT=canvas.width/GRID_SIZE;

let snake=[],food={},direction={x:0,y:0},nextDirection={x:0,y:0},score=0,highScore=localStorage.getItem('snakeHighScore')||0,gameLoop=null,gameSpeed=120,isGameRunning=false,isPaused=false,particles=[],foodPulse=0,snakeGlow=0;
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function playSound(type){const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);switch(type){case'eat':o.frequency.setValueAtTime(523.25,audioCtx.currentTime);o.frequency.setValueAtTime(659.25,audioCtx.currentTime+.05);o.frequency.setValueAtTime(783.99,audioCtx.currentTime+.1);g.gain.setValueAtTime(.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.2);o.start();o.stop(audioCtx.currentTime+.2);break;case'die':o.frequency.setValueAtTime(400,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+.5);g.gain.setValueAtTime(.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.5);o.type='sawtooth';o.start();o.stop(audioCtx.currentTime+.5);break;case'start':o.frequency.setValueAtTime(261.63,audioCtx.currentTime);o.frequency.setValueAtTime(329.63,audioCtx.currentTime+.1);o.frequency.setValueAtTime(392,audioCtx.currentTime+.2);o.frequency.setValueAtTime(523.25,audioCtx.currentTime+.3);g.gain.setValueAtTime(.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.4);o.start();o.stop(audioCtx.currentTime+.4);break}}
class Particle{constructor(x,y,c){this.x=x;this.y=y;this.vx=(Math.random()-.5)*8;this.vy=(Math.random()-.5)*8;this.life=1;this.decay=Math.random()*.03+.02;this.color=c;this.size=Math.random()*4+2}update(){this.x+=this.vx;this.y+=this.vy;this.vx*=.98;this.vy*=.98;this.life-=this.decay;this.size*=.97}draw(ctx){ctx.save();ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.shadowBlur=10;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}}
function initGame(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];direction={x:1,y:0};nextDirection={x:1,y:0};score=0;particles=[];spawnFood();updateScore();document.getElementById('highScore').textContent=highScore}
function spawnFood(){do{food={x:Math.floor(Math.random()*TILE_COUNT),y:Math.floor(Math.random()*TILE_COUNT),color:`hsl(${Math.random()*60+300},100%,60%)`,pulse:Math.random()*Math.PI*2}}while(snake.some(s=>s.x===food.x&&s.y===food.y))}
function createExplosion(x,y,c){const cx=x*GRID_SIZE+GRID_SIZE/2;const cy=y*GRID_SIZE+GRID_SIZE/2;for(let i=0;i<15;i++)particles.push(new Particle(cx,cy,c))}
function update(){if(isPaused||!isGameRunning)return;direction={...nextDirection};const head={x:snake[0].x+direction.x,y:snake[0].y+direction.y};if(head.x<0||head.x>=TILE_COUNT||head.y<0||head.y>=TILE_COUNT){gameOver();return}if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;createExplosion(food.x,food.y,food.color);playSound('eat');spawnFood();updateScore()}else snake.pop();particles=particles.filter(p=>{p.update();return p.life>0});foodPulse+=.05;snakeGlow+=.03}
function draw(){ctx.fillStyle='#0d1117';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(0,255,136,.03)';ctx.lineWidth=1;for(let i=0;i<=TILE_COUNT;i++){ctx.beginPath();ctx.moveTo(i*GRID_SIZE,0);ctx.lineTo(i*GRID_SIZE,canvas.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*GRID_SIZE);ctx.lineTo(canvas.width,i*GRID_SIZE);ctx.stroke()}
const fs=GRID_SIZE*.7+Math.sin(foodPulse)*3;ctx.save();ctx.shadowBlur=20+Math.sin(foodPulse)*10;ctx.shadowColor=food.color;ctx.fillStyle=food.color;ctx.beginPath();ctx.arc(food.x*GRID_SIZE+GRID_SIZE/2,food.y*GRID_SIZE+GRID_SIZE/2,fs/2,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(food.x*GRID_SIZE+GRID_SIZE/2-2,food.y*GRID_SIZE+GRID_SIZE/2-2,fs/4,0,Math.PI*2);ctx.fill();ctx.restore();
snake.forEach((s,i)=>{const h=i===0;const sz=h?GRID_SIZE-2:GRID_SIZE-4;const x=s.x*GRID_SIZE+(GRID_SIZE-sz)/2;const y=s.y*GRID_SIZE+(GRID_SIZE-sz)/2;ctx.save();const g=h?20:10;ctx.shadowBlur=g+Math.sin(snakeGlow+i*.5)*5;ctx.shadowColor=h?'#00ff88':'#00cc6a';const v=Math.max(100,255-i*5);ctx.fillStyle=h?'#00ff88':`rgb(0,${v},100)`;roundRect(ctx,x,y,sz,sz,h?6:4);ctx.fill();if(h){ctx.fillStyle='#000';const es=3,eo=4;let l,r;if(direction.x===1){l={x:x+sz-eo-es,y:y+eo};r={x:x+sz-eo-es,y:y+sz-eo-es}}else if(direction.x===-1){l={x:x+eo,y:y+eo};r={x:x+eo,y:y+sz-eo-es}}else if(direction.y===-1){l={x:x+eo,y:y+eo};r={x:x+sz-eo-es,y:y+eo}}else{l={x:x+eo,y:y+sz-eo-es};r={x:x+sz-eo-es,y:y+sz-eo-es}}ctx.beginPath();ctx.arc(l.x+es/2,l.y+es/2,es,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(r.x+es/2,r.y+es/2,es,0,Math.PI*2);ctx.fill()}ctx.restore()});
particles.forEach(p=>p.draw(ctx));if(isPaused&&isGameRunning){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.font='bold 40px Arial';ctx.textAlign='center';ctx.fillText('PAUSED',canvas.width/2,canvas.height/2);ctx.font='20px Arial';ctx.fillStyle='#888';ctx.fillText('按空格键继续',canvas.width/2,canvas.height/2+40)}}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function gameStep(){update();draw()}
function startGame(){if(isGameRunning)return;if(audioCtx.state==='suspended')audioCtx.resume();initGame();isGameRunning=true;isPaused=false;playSound('start');document.getElementById('startOverlay').classList.add('hidden');document.getElementById('gameOverOverlay').classList.add('hidden');document.getElementById('startBtn').textContent='游戏中';document.getElementById('startBtn').disabled=true;document.getElementById('startBtn').style.opacity='.5';gameLoop=setInterval(gameStep,gameSpeed)}
function togglePause(){if(!isGameRunning)return;isPaused=!isPaused;document.getElementById('pauseBtn').textContent=isPaused?'继续':'暂停';if(!isPaused&&audioCtx.state==='suspended')audioCtx.resume();draw()}
function gameOver(){isGameRunning=false;clearInterval(gameLoop);playSound('die');if(score>highScore){highScore=score;localStorage.setItem('snakeHighScore',highScore);document.getElementById('highScore').textContent=highScore}document.getElementById('finalScore').textContent=score;document.getElementById('gameOverOverlay').classList.remove('hidden');document.getElementById('startBtn').textContent='开始';document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').style.opacity='1'}
function restartGame(){document.getElementById('gameOverOverlay').classList.add('hidden');startGame()}
function updateScore(){document.getElementById('score').textContent=score;document.getElementById('length').textContent=snake.length}
function updateSpeed(){const s=document.getElementById('speedSlider');const v=parseInt(s.value);gameSpeed=250-v;const t=document.getElementById('speedValue');if(v<80)t.textContent='慢速';else if(v<130)t.textContent='正常';else if(v<170)t.textContent='快速';else t.textContent='极速';if(isGameRunning&&!isPaused){clearInterval(gameLoop);gameLoop=setInterval(gameStep,gameSpeed)}}
document.addEventListener('keydown',e=>{if(!isGameRunning&&e.key!==' ')return;switch(e.key){case'ArrowUp':case'w':case'W':if(direction.y===0)nextDirection={x:0,y:-1};e.preventDefault();break;case'ArrowDown':case's':case'S':if(direction.y===0)nextDirection={x:0,y:1};e.preventDefault();break;case'ArrowLeft':case'a':case'A':if(direction.x===0)nextDirection={x:-1,y:0};e.preventDefault();break;case'ArrowRight':case'd':case'D':if(direction.x===0)nextDirection={x:1,y:0};e.preventDefault();break;case' ':togglePause();e.preventDefault();break}});
let tx=0,ty=0;canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault()},{passive:false});
canvas.addEventListener('touchend',e=>{if(!isGameRunning||isPaused)return;const dx=e.changedTouches[0].clientX-tx;const dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&direction.x===0)nextDirection={x:1,y:0};else if(dx<0&&direction.x===0)nextDirection={x:-1,y:0}}else{if(dy>0&&direction.y===0)nextDirection={x:0,y:1};else if(dy<0&&direction.y===0)nextDirection={x:0,y:-1}}e.preventDefault()},{passive:false});
document.getElementById('highScore').textContent=highScore;initGame();draw();
</script>
</body>
</html>
